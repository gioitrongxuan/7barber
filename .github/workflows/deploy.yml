name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package build output
        run: |
          mkdir -p dist
          cp -r .next/standalone/. dist/
          cp -r .next/static dist/.next/static
          cp -r public dist/public
          cp -r data dist/data
          tar -czf dist.tar.gz dist/

      - name: Copy files to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            dist.tar.gz nginx.conf \
            $EC2_USERNAME@$EC2_HOST:/tmp/

      - name: Setup swap & install dependencies on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            $EC2_USERNAME@$EC2_HOST bash << 'ENDSSH'
          set -e
          export DEBIAN_FRONTEND=noninteractive

          # --- Tạo swap 1GB nếu chưa có ---
          if [ ! -f /swapfile ]; then
            echo "--- Tạo swap 1GB ---"
            sudo fallocate -l 1G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            sudo sysctl vm.swappiness=10
            echo 'vm.swappiness=10' | sudo tee -a /etc/sysctl.conf
          fi
          echo "RAM + Swap: $(free -h | grep -E 'Mem|Swap')"

          # --- Node.js 20 ---
          if ! node -e "if(parseInt(process.versions.node)<20)process.exit(1)" 2>/dev/null; then
            echo "--- Cài Node.js 20 ---"
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - 2>/dev/null
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
          fi

          # --- PM2 ---
          if ! command -v pm2 &>/dev/null; then
            echo "--- Cài PM2 ---"
            sudo npm install -g pm2
          fi

          # --- Nginx ---
          if ! command -v nginx &>/dev/null; then
            echo "--- Cài Nginx ---"
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nginx
          fi

          echo "Node: $(node -v) | PM2: $(pm2 -v) | Nginx: $(nginx -v 2>&1)"
          ENDSSH

      - name: Deploy app on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            $EC2_USERNAME@$EC2_HOST bash << 'ENDSSH'
          set -e

          # --- Backup dữ liệu người dùng ---
          if [ -f ~/7barber/data/content.json ]; then
            cp ~/7barber/data/content.json /tmp/content.json.bak
          fi
          if [ -d ~/7barber/public/uploads ]; then
            cp -r ~/7barber/public/uploads /tmp/uploads.bak
          fi

          # --- Giải nén bản build mới ---
          rm -rf /tmp/dist
          tar -xzf /tmp/dist.tar.gz -C /tmp/
          rm -rf ~/7barber
          mv /tmp/dist ~/7barber

          # --- Khôi phục dữ liệu người dùng ---
          mkdir -p ~/7barber/public/uploads ~/7barber/data
          if [ -f /tmp/content.json.bak ]; then
            mv /tmp/content.json.bak ~/7barber/data/content.json
          fi
          if [ -d /tmp/uploads.bak ]; then
            cp -r /tmp/uploads.bak/. ~/7barber/public/uploads/
            rm -rf /tmp/uploads.bak
          fi
          ENDSSH

      - name: Setup Nginx & Start PM2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            $EC2_USERNAME@$EC2_HOST bash << 'ENDSSH'
          set -e

          # --- Nginx config ---
          if [ ! -f /etc/nginx/sites-enabled/7barber ]; then
            sudo cp /tmp/nginx.conf /etc/nginx/sites-available/7barber
            sudo ln -sf /etc/nginx/sites-available/7barber /etc/nginx/sites-enabled/7barber
            sudo rm -f /etc/nginx/sites-enabled/default
          fi
          sudo nginx -t && sudo systemctl enable nginx && sudo systemctl reload nginx

          # --- PM2: giới hạn 200MB, tự restart nếu vượt ---
          cd ~/7barber
          pm2 delete 7barber 2>/dev/null || true
          PORT=3000 NODE_OPTIONS="--max-old-space-size=180" \
            pm2 start server.js \
              --name 7barber \
              --max-memory-restart 200M \
              --restart-delay 3000
          pm2 save

          # --- PM2 tự start khi reboot ---
          sudo env PATH=$PATH:/usr/bin pm2 startup systemd -u $USER --hp $HOME 2>/dev/null | grep "sudo" | bash || true

          rm -f /tmp/dist.tar.gz /tmp/nginx.conf
          echo "✅ Deploy thành công!"
          free -h
          ENDSSH

          rm -f /tmp/deploy_key
