services:
  app:
    image: 7barber:latest
    container_name: 7barber
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SESSION_SECRET=${SESSION_SECRET:-barber-secret-2024}
    volumes:
      - barber_data:/app/data
      - barber_uploads:/app/public/uploads

volumes:
  barber_data:
  barber_uploads:
